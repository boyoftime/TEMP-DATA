    <style>
        /* --- Base & Typography --- */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #50e3c2;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --text-dark: #333;
            --text-light: #6c757d;
            --border-color: #e8e8e8;
            --shadow-light: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        /* --- Main Container & Header --- */
        .container {
            max-width: 1400px;
            margin: 20px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 900;
            color: var(--primary-color);
            margin: 0;
        }

        .header p {
            font-size: 1.1em;
            color: var(--text-light);
        }

        /* --- Summary Statistics --- */
        .summary-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-background);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-light);
            text-align: center;
            flex-grow: 1;
            min-width: 200px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-card .label {
            font-size: 0.9em;
            color: var(--text-light);
            margin-top: 5px;
        }

        /* --- Controls: Search & Filter --- */
        .controls-container {
            background: var(--card-background);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-light);
            margin-bottom: 30px;
        }
        
        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1em;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }
        
        .filter-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: 700;
            border: 1px solid var(--border-color);
            background-color: #f8f9fa;
            color: var(--text-light);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        
        .filter-btn:hover {
            background-color: #e9ecef;
            border-color: #d3d9df;
        }
        
        .filter-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* --- User List & Cards --- */
        .user-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: var(--card-background);
            border-radius: 12px;
            box-shadow: var(--shadow-light);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative; /* Needed for index positioning */
        }
        
        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            font-size: 1.2em;
            font-weight: 700;
        }
        
        .user-index {
            position: absolute;
            top: 10px;
            right: 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 0.8em;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .card-body {
            padding: 20px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: var(--text-light);
            font-size: 0.9em;
        }

        .data-value {
            font-weight: 700;
            font-size: 1em;
        }
        
        .data-value.empty {
            color: #aaa;
            font-style: italic;
            font-weight: 400;
        }

        .copy-icon {
            color: #ccc;
            cursor: pointer;
            margin-left: 15px;
            transition: color 0.2s;
        }

        .copy-icon:hover {
            color: var(--primary-color);
        }
        
        /* --- Toast Notification --- */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            font-size: 1em;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>

        const userList = document.getElementById('userList');
        const searchInput = document.getElementById('searchInput');
        const filterControls = document.getElementById('filterControls');
        let toastTimeout;
        let activeFilter = 'all';

        // --- Helper to parse numbers with commas ---
        function parseNumber(str) {
            return parseInt(str.replace(/,/g, ''), 10) || 0;
        }

        // --- Function to show a toast notification ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000); // Hide after 2 seconds
        }

        // --- Function to handle the copy action ---
        function handleCopy(event) {
            const target = event.target;
            if (target.classList.contains('copy-icon')) {
                const valueElement = target.previousElementSibling;
                const textToCopy = valueElement.textContent;
                const dataType = target.dataset.type;

                if (textToCopy && textToCopy !== 'N/A') {
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        showToast(`${dataType} copied!`);
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                        showToast('Failed to copy.');
                    });
                } else {
                    showToast('Nothing to copy.');
                }
            }
        }

        // --- Function to render user cards ---
        function renderUsers(usersToRender) {
            userList.innerHTML = ''; // Clear the list
            if (usersToRender.length === 0) {
                userList.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #888;">No users found matching your criteria.</p>';
                return;
            }
            
            usersToRender.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="card-header">
                        ${user.username}
                        <span class="user-index">#${index + 1}</span>
                    </div>
                    <div class="card-body">
                        <div class="data-row">
                            <span class="data-label">Phone</span>
                            <div>
                                <span class="data-value">${user.phone}</span>
                                <i class="fas fa-copy copy-icon" data-type="Phone number"></i>
                            </div>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Balance</span>
                             <div>
                                <span class="data-value">${user.balance}</span>
                                <i class="fas fa-copy copy-icon" data-type="Balance"></i>
                            </div>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Gems</span>
                            <div>
                                <span class="data-value">${user.gems}</span>
                                <i class="fas fa-copy copy-icon" data-type="Gems"></i>
                            </div>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Payment Number</span>
                            <div>
                                <span class="data-value ${user.paymentNumber === 'N/A' ? 'empty' : ''}">${user.paymentNumber}</span>
                                <i class="fas fa-copy copy-icon" data-type="Payment number"></i>
                            </div>
                        </div>
                    </div>
                `;
                userList.appendChild(card);
            });
        }
        
        // --- Central function to apply all filters and render ---
        function applyFiltersAndRender() {
            const searchQuery = searchInput.value.toLowerCase();
            let filteredData = userData;

            // 1. Apply the gem filter
            if (activeFilter === 'high-gems') {
                filteredData = userData.filter(user => parseNumber(user.gems) >= 5000);
            } else if (activeFilter === 'zero-gems') {
                filteredData = userData.filter(user => parseNumber(user.gems) === 0);
            }

            // 2. Apply the search filter on the already-filtered data
            if (searchQuery) {
                filteredData = filteredData.filter(user => {
                    return user.username.toLowerCase().includes(searchQuery) || user.phone.includes(searchQuery);
                });
            }

            renderUsers(filteredData);
        }

        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            applyFiltersAndRender(); // Initial render
        });

        searchInput.addEventListener('keyup', applyFiltersAndRender);
        userList.addEventListener('click', handleCopy);
        
        filterControls.addEventListener('click', (event) => {
            const target = event.target;
            if (target.tagName === 'BUTTON') {
                // Update active button style
                filterControls.querySelector('.active').classList.remove('active');
                target.classList.add('active');
                
                // Update active filter state
                activeFilter = target.dataset.filter;
                
                // Re-render the list
                applyFiltersAndRender();
            }
        });

    </script>
